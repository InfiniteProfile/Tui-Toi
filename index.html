<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Tui Toi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#0a0b0c;
    --surface:#131517;
    --surface-hover:#191c1f;
    --line:#232629;
    --text:#e9e7e1;
    --muted:#84898d;
    --gold:#c9a769;
    --teal:#3f9b93;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    scroll-behavior:smooth;
  }

  ::selection{ background:var(--gold); color:#0a0b0c; }

  a{ color:inherit; }

  header{
    padding:56px 6vw 28px;
    border-bottom:1px solid var(--line);
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    width:16px; height:1px;
    background:var(--gold);
    display:inline-block;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:300;
    font-style:italic;
    font-size:clamp(40px, 7vw, 84px);
    letter-spacing:-0.01em;
    margin-top:14px;
    color:var(--text);
  }

  .meta-row{
    margin-top:22px;
    display:flex;
    flex-wrap:wrap;
    gap:28px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
  }
  .meta-row span b{ color:var(--text); font-weight:500; }

  main{ padding:40px 6vw 20px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:3px;
  }

  .card{
    position:relative;
    aspect-ratio:3/4;
    background:var(--surface);
    overflow:hidden;
    cursor:pointer;
    border:1px solid transparent;
    transition:border-color .25s ease;
  }
  .card:hover{ border-color:var(--line); }

  .card img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    opacity:0;
    transform:scale(1.02);
    transition:opacity .5s ease, transform .6s ease, filter .4s ease;
    filter:saturate(0.94);
  }
  .card img.loaded{ opacity:1; transform:scale(1); }
  .card:hover img{ filter:saturate(1.05) brightness(1.03); transform:scale(1.035); }

  .card .idx{
    position:absolute;
    bottom:8px; right:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:rgba(233,231,225,0.0);
    letter-spacing:.06em;
    transition:color .25s ease;
    pointer-events:none;
    text-shadow:0 1px 6px rgba(0,0,0,.6);
  }
  .card:hover .idx{ color:rgba(233,231,225,0.75); }

  .card .ph{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    font-size:10px;
    font-family:'JetBrains Mono', monospace;
    letter-spacing:.08em;
  }

  .group-header{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:var(--text);
    margin:44px 0 14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
    grid-column:1/-1;
  }

  /* pagination */
  .pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:6px;
    padding:56px 6vw 80px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
  }
  .page-btn{
    min-width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    cursor:pointer;
    transition:all .2s ease;
    padding:0 8px;
  }
  .page-btn:hover{ border-color:var(--gold); color:var(--text); }
  .page-btn.active{
    background:var(--gold);
    border-color:var(--gold);
    color:#0a0b0c;
    font-weight:500;
  }
  .page-btn:disabled{ opacity:.3; cursor:default; }
  .page-btn.dots{ border-color:transparent; cursor:default; color:var(--muted); }
  .page-btn.dots:hover{ border-color:transparent; color:var(--muted); }

  /* lightbox */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(6,7,8,0.97);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    -webkit-tap-highlight-color:transparent;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{
    max-width:92vw;
    max-height:88vh;
    object-fit:contain;
    box-shadow:0 20px 80px rgba(0,0,0,.6);
  }
  .lightbox .close, .lightbox .nav{
    position:absolute;
    background:transparent;
    border:1px solid rgba(233,231,225,0.18);
    color:var(--text);
    width:44px; height:44px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:18px;
    transition:border-color .2s ease, background .2s ease;
  }
  .lightbox .close:hover, .lightbox .nav:hover{
    border-color:var(--gold);
    background:rgba(201,167,105,0.08);
  }
  .lightbox .close{ top:22px; right:22px; }
  .lightbox .nav.prev{ left:22px; top:50%; transform:translateY(-50%); }
  .lightbox .nav.next{ right:22px; top:50%; transform:translateY(-50%); }
  .lightbox .counter{
    position:absolute;
    bottom:24px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    letter-spacing:.08em;
  }

  @media (max-width:640px){
    .grid{ grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:2px; }
    .lightbox .nav{ width:38px; height:38px; }
    header{ padding:40px 5vw 22px; }
    main{ padding:28px 5vw 10px; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; animation:none !important; }
  }

  :focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
</style>
</head>

IMG_20260710_130116_790.jpg", "IMG_20260710_130118_521.jpg", "IMG_20260710_130120_143.jpg", "IMG_20260710_130122_129.jpg", "IMG_20260710_130123_618.jpg", "IMG_20260710_130125_169.jpg", "IMG_20260710_130126_863.jpg", "IMG_20260710_130128_371.jpg", "IMG_20260710_130129_988.jpg", "IMG_20260710_130131_571.jpg", "IMG_20260710_130133_204.jpg", "IMG_20260710_130134_907.jpg", "IMG_20260710_130136_471.jpg", "IMG_20260710_130140_870.jpg", "IMG_20260710_130142_352.jpg", "IMG_20260710_130143_857.jpg", "IMG_20260710_130145_465.jpg", "IMG_20260710_130155_394.jpg", "IMG_20260710_130157_461.jpg", "IMG_20260710_130200_055.jpg", "IMG_20260710_130202_129.jpg", "IMG_20260710_130204_444.jpg", "IMG_20260710_130206_039.jpg", "IMG_20260710_130207_708.jpg", "IMG_20260710_130209_536.jpg", "IMG_20260710_130214_667.jpg", "IMG_20260710_130216_284.jpg"];

  const RAW_ENTRIES = RAW_FILES.map(function(f){ return { type: "image", file: f }; });

  // ---------------------------------------------------------------
  // Build grouped, flat render list: { file, group, globalIndex }
  // ---------------------------------------------------------------
  const items = [];
  let currentGroup = null;
  RAW_ENTRIES.forEach(function(entry){
    if (entry.type === "name") {
      currentGroup = entry.value;
    } else if (entry.type === "image") {
      items.push({ file: entry.file, group: currentGroup });
    }
  });

  items.forEach(function(it, i){ it.globalIndex = i; });

  const totalPages = Math.max(1, Math.ceil(items.length / PER_PAGE));
  let currentPage = 1;

  const gridEl = document.getElementById("grid");
  const paginationEl = document.getElementById("pagination");
  const totalCountEl = document.getElementById("total-count");
  const pageCountEl = document.getElementById("page-count");
  const currentPageLabelEl = document.getElementById("current-page-label");

  totalCountEl.textContent = items.length;
  pageCountEl.textContent = totalPages;

  // ---------------------------------------------------------------
  // Virtualized image loading: only images visible in the viewport
  // for the CURRENT page get their src set. On page change, the
  // previous page's DOM (and image bytes) is fully discarded.
  // ---------------------------------------------------------------
  let observer = null;

  function teardownObserver(){
    if (observer) { observer.disconnect(); observer = null; }
  }

  function setupObserver(){
    teardownObserver();
    observer = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if (entry.isIntersecting) {
          const img = entry.target;
          const src = img.getAttribute("data-src");
          if (src && !img.getAttribute("src")) {
            img.setAttribute("src", src);
          }
          observer.unobserve(img);
        }
      });
    }, { root: null, rootMargin: "200px 0px", threshold: 0.01 });

    gridEl.querySelectorAll("img[data-src]").forEach(function(img){
      observer.observe(img);
    });
  }

  function onImgLoad(img){
    img.classList.add("loaded");
    const ph = img.parentElement.querySelector(".ph");
    if (ph) ph.remove();
  }

  function onImgError(img){
    const ph = img.parentElement.querySelector(".ph");
    if (ph) ph.textContent = "unavailable";
    img.remove();
  }

  // ---------------------------------------------------------------
  // Render current page
  // ---------------------------------------------------------------
  function renderPage(page){
    currentPage = Math.min(Math.max(1, page), totalPages);

    // Fully unload previous page: clear DOM, drop observer, let GC
    // reclaim decoded image bitmaps.
    teardownObserver();
    gridEl.innerHTML = "";

    const start = (currentPage - 1) * PER_PAGE;
    const end = Math.min(start + PER_PAGE, items.length);
    const slice = items.slice(start, end);

    const frag = document.createDocumentFragment();
    let lastGroup = undefined;

    slice.forEach(function(it){
      if (it.group !== lastGroup && it.group) {
        const h = document.createElement("div");
        h.className = "group-header";
        h.textContent = it.group;
        frag.appendChild(h);
      }
      lastGroup = it.group;

      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("data-index", it.globalIndex);

      const ph = document.createElement("div");
      ph.className = "ph";
      ph.textContent = "loading";
      card.appendChild(ph);

      const img = document.createElement("img");
      img.setAttribute("data-src", BASE_URL + it.file);
      img.setAttribute("loading", "lazy");
      img.setAttribute("decoding", "async");
      img.setAttribute("alt", "");
      img.addEventListener("load", function(){ onImgLoad(img); });
      img.addEventListener("error", function(){ onImgError(img); });
      card.appendChild(img);

      card.addEventListener("click", function(){ openLightbox(it.globalIndex); });

      frag.appendChild(card);
    });

    gridEl.appendChild(frag);
    setupObserver();

    currentPageLabelEl.textContent = currentPage;
    renderPagination();
    window.scrollTo({ top: 0, behavior: "instant" in window.scrollTo ? "instant" : "auto" });
  }

  // ---------------------------------------------------------------
  // Pagination controls (direct access, windowed with ellipses)
  // ---------------------------------------------------------------
  function renderPagination(){
    paginationEl.innerHTML = "";

    function makeBtn(label, page, opts){
      opts = opts || {};
      const btn = document.createElement("button");
      btn.className = "page-btn" + (opts.active ? " active" : "") + (opts.dots ? " dots" : "");
      btn.textContent = label;
      if (opts.dots) {
        btn.disabled = true;
      } else {
        btn.disabled = !!opts.disabled;
        btn.addEventListener("click", function(){ renderPage(page); });
      }
      return btn;
    }

    paginationEl.appendChild(makeBtn("\u2039", currentPage - 1, { disabled: currentPage === 1 }));

    const windowSize = 2;
    const pages = new Set();
    pages.add(1);
    pages.add(totalPages);
    for (let p = currentPage - windowSize; p <= currentPage + windowSize; p++){
      if (p >= 1 && p <= totalPages) pages.add(p);
    }
    const sorted = Array.from(pages).sort(function(a,b){ return a-b; });

    let prev = 0;
    sorted.forEach(function(p){
      if (p - prev > 1) {
        paginationEl.appendChild(makeBtn("\u2026", 0, { dots: true }));
      }
      paginationEl.appendChild(makeBtn(String(p), p, { active: p === currentPage }));
      prev = p;
    });

    paginationEl.appendChild(makeBtn("\u203a", currentPage + 1, { disabled: currentPage === totalPages }));
  }

  // ---------------------------------------------------------------
  // Lightbox
  // ---------------------------------------------------------------
  const lightboxEl = document.getElementById("lightbox");
  const lbImg = document.getElementById("lb-img");
  const lbCounter = document.getElementById("lb-counter");
  let lbIndex = 0;

  function openLightbox(globalIndex){
    lbIndex = globalIndex;
    updateLightboxImage();
    lightboxEl.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox(){
    lightboxEl.classList.remove("open");
    lbImg.src = "";
    document.body.style.overflow = "";
  }

  function updateLightboxImage(){
    const it = items[lbIndex];
    if (!it) return;
    lbImg.src = BASE_URL + it.file;
    lbCounter.textContent = (lbIndex + 1) + " / " + items.length;

    const targetPage = Math.floor(lbIndex / PER_PAGE) + 1;
    if (targetPage !== currentPage) {
      // Keep the underlying grid in sync so closing the lightbox
      // lands the visitor on the right page.
      currentPage = targetPage;
    }
  }

  function lbNext(){
    lbIndex = (lbIndex + 1) % items.length;
    updateLightboxImage();
  }
  function lbPrev(){
    lbIndex = (lbIndex - 1 + items.length) % items.length;
    updateLightboxImage();
  }

  document.getElementById("lb-close").addEventListener("click", closeLightbox);
  document.getElementById("lb-next").addEventListener("click", lbNext);
  document.getElementById("lb-prev").addEventListener("click", lbPrev);

  lightboxEl.addEventListener("click", function(e){
    if (e.target === lightboxEl) closeLightbox();
  });

  document.addEventListener("keydown", function(e){
    if (!lightboxEl.classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") lbNext();
    if (e.key === "ArrowLeft") lbPrev();
  });

  // touch swipe
  let touchStartX = null;
  lightboxEl.addEventListener("touchstart", function(e){
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });
  lightboxEl.addEventListener("touchend", function(e){
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx < 0) lbNext(); else lbPrev();
    }
    touchStartX = null;
  }, { passive: true });

  // sync page render when navigating lightbox across page boundary
  const originalUpdate = updateLightboxImage;
  updateLightboxImage = function(){
    const prevPage = currentPage;
    originalUpdate();
    if (currentPage !== prevPage) {
      // silently keep grid state consistent without disrupting lightbox
      currentPageLabelEl.textContent = currentPage;
    }
  };

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  renderPage(1);
})();
